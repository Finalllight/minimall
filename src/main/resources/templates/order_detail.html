<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="fragments/header :: header"></div>
<h2>订单详情</h2>

<p>订单号：[[${order.id}]]</p>
<p>总价：[[${order.totalAmount}]]</p>
<p>实付：[[${order.payAmount}]]</p>

<table border="1">
    <tr><th>商品</th><th>价格</th><th>数量</th></tr>
    <tr th:each="i : ${items}">
        <td>[[${i.productName}]]</td>
        <td>[[${i.price}]]</td>
        <td>[[${i.quantity}]]</td>
    </tr>
</table>
</body>
</html>
