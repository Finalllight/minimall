<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="fragments/header :: header"></div>
<h2>购物车</h2>

<table border="1">
    <tr><th>商品</th><th>价格</th><th>数量</th><th>小计</th><th>操作</th></tr>
    <tr th:each="item : ${items}">
        <td>[[${item.product.name}]]</td>
        <td>[[${item.product.price}]]</td>
        <td>
            <form method="post" th:action="@{/cart/update}">
                <input type="hidden" name="itemId" th:value="${item.cartItem.id}">
                <input name="quantity" th:value="${item.cartItem.quantity}">
                <button type="submit">更新</button>
            </form>
        </td>
        <td>[[${item.subTotal}]]</td>
        <td><a th:href="@{'/cart/delete/' + ${item.cartItem.id}}">删除</a></td>
    </tr>
</table>

<p>总价：[[${total}]]</p>
<a th:href="@{/checkout}">去结算</a>
</body>
</html>
