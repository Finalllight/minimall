<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>全部订单</title>
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<h2>全部订单</h2>

<table border="1">
    <tr><th>订单号</th><th>用户ID</th><th>总价</th><th>实付</th><th>时间</th></tr>
    <tr th:each="o : ${orders}">
        <td><a th:href="@{'/admin/orders/' + ${o.id}}">[[${o.id}]]</a></td>
        <td>[[${o.userId}]]</td>
        <td>[[${o.totalAmount}]]</td>
        <td>[[${o.payAmount}]]</td>
        <td>[[${o.createdTime}]]</td>
    </tr>
</table>

</body>
</html>
