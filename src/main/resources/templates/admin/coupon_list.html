<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>优惠券管理</title>
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<h2>优惠券管理</h2>
<a th:href="@{/admin/coupons/new}">新增优惠券</a>

<table border="1">
    <tr>
        <th>ID</th><th>用户ID</th><th>类型</th><th>门槛</th>
        <th>额度</th><th>数量</th><th>操作</th>
    </tr>
    <tr th:each="c : ${coupons}">
        <td>[[${c.id}]]</td>
        <td>[[${c.userId}]]</td>
        <td>[[${c.type}]]</td>
        <td>[[${c.threshold}]]</td>
        <td>[[${c.amount}]]</td>
        <td>[[${c.quantity}]]</td>
        <td>
            <a th:href="@{'/admin/coupons/edit/' + ${c.id}}">编辑</a>
            <a th:href="@{'/admin/coupons/delete/' + ${c.id}}">删除</a>
        </td>
    </tr>
</table>

</body>
</html>
